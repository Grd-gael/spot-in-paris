<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot In Paris</title>
    <link rel="icon" href="" />
    <link rel="stylesheet" href="./styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body>

    <div class="container mt-5">
        <div class="header">
            <h1 class="text-left">SpotInParis</h1>
        </div>

        <div class="row mb-4 align-items-center">
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Tous les événements</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-secondary w-100">Événements gratuits</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-secondary w-100">Événements de ce jour</button>
            </div>
            <div class="col-md-3">
                <input class="form-control" placeholder="Rechercher un événement">
            </div>
            <div class="col-md-3">
                <select class="form-control">
                    <option value="">Type d'événement</option>
                    <option value="concert">Concert</option>
                    <option value="exposition">Exposition</option>
                    <option value="theatre">Théâtre</option>
                    <option value="cinema">Cinéma</option>
                </select>
            </div>

        </div>


        <div id="events"></div>
    </div>

</body>

<script type="module" src="/app.js"></script>

</html>
