<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spot In Paris</title>
    <link rel="icon" href="" />
    <link rel="stylesheet" href="./styles/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
</head>

<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <header class="bg-dark border-bottom border-danger border-3 py-3 sticky-top">
        <div class="container">
            <h1 class="font-playfair fw-bold text-white mb-0 fs-1">Spot<span class="text-danger">In</span>Paris</h1>
            <p class="text-secondary text-uppercase mb-0" style="font-size:0.7rem;letter-spacing:4px">Découvrez les
                événements de la capitale</p>
        </div>
    </header>

    <div class="bg-dark border-bottom border-secondary py-2">
        <div class="container">
            <div class="row g-2 align-items-center">
                <div class="col-6 col-md-2">
                    <button class="btn btn-outline-secondary btn-sm w-100" id="reset-button">↺ Réinitialiser</button>
                </div>
                <div class="col-6 col-md-1 d-flex align-items-center justify-content-center gap-2">
                    <div class="form-check form-check-sm text-light">
                        <input class="form-check-input" type="checkbox" id="free-checkbox">
                        <label class="form-check-label" for="free-checkbox">Gratuit</label>
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <input class="form-control form-control-sm border-secondary text-white" type="text" id="search-bar"
                        placeholder="Rechercher un événement" style="color: white !important;" />
                </div>
                <div class="col-6 col-md-2">
                    <input class="form-control form-control-sm bg-dark border-secondary text-light" id="date-filter"
                        type="date" />
                </div>
                <div class="col-6 col-md-3">
                    <select class="form-select form-select-sm bg-dark border-secondary text-light" id="tag-filter">
                        <option value="">— Type d'événement —</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div id="events"></div>
    </div>

</body>

<script type="module" src="./App/app.js"></script>

</html>
